services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playtopass
      POSTGRES_DB: playto
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A playto worker -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A playto beat -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
